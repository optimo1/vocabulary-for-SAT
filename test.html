<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Test Fetch</h1>
    <button onclick="testFetch()">Test Fetch</button>
    <pre id="result"></pre>
    <script>
        async function testFetch() {
            const res = await fetch('vocab.json?' + Date.now());
            document.getElementById('result').textContent = 
                'Status: ' + res.status + '\n' +
                'OK: ' + res.ok + '\n' +
                'Content-Type: ' + res.headers.get('content-type');
            if (res.ok) {
                const data = await res.json();
                document.getElementById('result').textContent += '\nLoaded ' + data.length + ' words';
            }
        }
    </script>
</body>
</html>
